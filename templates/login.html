<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYLINE - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-bg">
    <div class="login-card">

        <!-- Status -->
        <div class="login-status">
            <span class="login-status-dot"></span>
            Systems Online
        </div>

        <!-- Logo -->
        <div class="login-logo" style="flex-direction:column; gap:6px;">
            <img src="/static/uploads/logo.png" alt="SKYLINE" style="width:110px; height:110px; border-radius:50%; object-fit:cover; box-shadow:0 0 28px rgba(0,217,255,0.35), 0 0 8px rgba(124,58,237,0.4);">
        </div>
        <p class="login-subtitle" style="margin-top:10px;">Authentication Management System</p>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}" style="margin-bottom: 14px;">
            <span>{{ message }}</span>
            <button class="flash-close" onclick="this.parentElement.remove()">&times;</button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <!-- Form -->
        <form method="POST" autocomplete="off">
            <label class="login-label">Username</label>
            <div class="login-input-wrap">
                <i class="fas fa-user input-icon"></i>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus autocomplete="username">
            </div>

            <label class="login-label" style="margin-top:4px;">Password</label>
            <div class="login-input-wrap">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-arrow-right-to-bracket"></i>
                Sign In
            </button>
        </form>

        <p style="text-align:center; margin-top:20px; font-size:11px; color: var(--text-muted);">
            &copy; {{ 2025 }} SKYLINE &mdash; Secure Auth Panel
        </p>
    </div>
</div>
</body>
</html>
